name: Release Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set package name
        id: vars
        run: echo "pkg=GreenPad-lng-$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Create zip
        run: zip -r "${{ steps.vars.outputs.pkg }}.zip" README.md lang/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.pkg }}
          path: ${{ steps.vars.outputs.pkg }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.pkg }}
          name: ${{ steps.vars.outputs.pkg }}
          files: ${{ steps.vars.outputs.pkg }}.zip
